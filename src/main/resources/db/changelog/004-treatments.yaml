databaseChangeLog:
  - changeSet:
      id: 1
      author: you
      changes:
        - createTable:
            tableName: treatments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true

              - column:
                  name: diagnosis_id
                  type: bigint

              - column:
                  name: type
                  type: varchar(20)

              - column:
                  name: description
                  type: varchar(500)

              - column:
                  name: assigned_by_role
                  type: varchar(20)

              - column:
                  name: status
                  type: varchar(20)

        - addForeignKeyConstraint:
            baseTableName: treatments
            baseColumnNames: diagnosis_id
            referencedTableName: diagnoses
            referencedColumnNames: id
            constraintName: fk_treatments_diagnosis